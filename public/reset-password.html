<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>تعيين كلمة المرور — ديوان آل طه</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/brand/light/Favicon/favicon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="theme-color" content="#0F1B2D">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ═══ AuthDS standalone (EB-08) — brand-package look, matches the login card ═══ */
:root{--b-navy:#0F1B2D;--b-navy2:#16273D;--b-white:#fff;--b-border:#EDE9E0;--b-text:#0F1B2D;--b-text2:#555;
  --b-text3:#888;--b-input-bg:#FAFAF8;--b-input-border:#DDD9D0;--b-placeholder:#B8B4AC;
  --ok:#176D3D;--okL:#0E9E84;--err:#B3261E;--warn:#D97706;--warn2:#CA8A04;--soft:#F4F6F8;
  --fn:'IBM Plex Sans Arabic','Segoe UI',Tahoma,sans-serif;--fm:'IBM Plex Mono',Menlo,monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fn);background:var(--soft);color:var(--b-text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{width:100%;max-width:460px;background:var(--b-white);border:.5px solid var(--b-border);border-radius:14px;
  padding:36px 36px 28px;box-shadow:0 2px 16px rgba(0,0,0,.05);position:relative;overflow:hidden;
  animation:up .42s cubic-bezier(.22,1,.36,1) both}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.brand{text-align:center;margin-bottom:6px}
.brand img{width:60px;height:60px;object-fit:contain}
.brand h1{font-size:22px;font-weight:700;color:var(--b-text);margin-top:6px}
.brand p{font-size:13px;color:var(--b-text3);margin-top:5px;line-height:1.8}
.rule{height:1px;background:var(--b-border);margin:18px 0 22px}
.center-state{text-align:center;padding:14px 0 8px}
.center-state .ico{font-size:40px;display:block;margin-bottom:12px}
.center-state.err .ico{color:var(--err)}.center-state.ok .ico{color:var(--ok)}
.center-state p{font-size:14px;line-height:1.9;color:var(--b-text2)}
.auth-fi{margin-bottom:14px}
.auth-fi label{display:block;font-size:12px;font-weight:600;color:var(--b-text2);margin-bottom:7px}
.auth-field{position:relative}
.auth-field .afi{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:17px;color:var(--b-placeholder);pointer-events:none;transition:color .18s}
.auth-field input{width:100%;height:52px;background:var(--b-input-bg);border:1px solid var(--b-input-border);border-radius:10px;
  padding:0 44px;font-family:var(--fm);font-size:15px;letter-spacing:.06em;color:var(--b-text);outline:none;direction:ltr;
  transition:border-color .2s,background .2s,box-shadow .2s}
.auth-field input::placeholder{color:var(--b-placeholder);letter-spacing:.2em}
.auth-field input:focus{border-color:var(--b-navy);background:var(--b-white);box-shadow:0 0 0 3px rgba(15,27,45,.07)}
.auth-field:focus-within .afi{color:var(--b-navy)}
.pw-eye{position:absolute;left:6px;top:50%;transform:translateY(-50%);width:40px;height:40px;border:none;background:none;
  color:var(--b-placeholder);font-size:18px;cursor:pointer;border-radius:8px;display:grid;place-items:center;transition:color .15s,background .15s}
.pw-eye:hover{color:var(--b-text2);background:var(--soft)}
.pw-eye.pop i{animation:eyePop .28s ease}
@keyframes eyePop{0%{transform:scale(.6);opacity:.4}100%{transform:scale(1);opacity:1}}
.pw-meter{display:flex;align-items:center;gap:12px;margin:-4px 0 12px}
.pw-meter-track{flex:1;height:6px;border-radius:6px;background:#EEF1F5;overflow:hidden}
.pw-meter-track i{display:block;height:100%;width:0;border-radius:6px;transition:width .35s cubic-bezier(.22,1,.36,1),background-color .35s}
.pw-meter-track i.l0{background:var(--err)}.pw-meter-track i.l1{background:var(--warn)}
.pw-meter-track i.l2{background:var(--warn2)}.pw-meter-track i.l3{background:var(--okL)}.pw-meter-track i.l4{background:#0E7C66}
.pw-meter-lvl{font-size:11.5px;font-weight:700;min-width:64px;color:var(--b-text3);transition:color .3s}
.pw-meter-lvl.l0{color:var(--err)}.pw-meter-lvl.l1{color:var(--warn)}.pw-meter-lvl.l2{color:var(--warn2)}
.pw-meter-lvl.l3{color:var(--okL)}.pw-meter-lvl.l4{color:var(--ok)}
.pw-checks{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;margin:0 0 16px;padding:12px 14px;
  background:var(--soft);border:1px solid var(--b-border);border-radius:10px}
.pw-checks li{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--b-text3);transition:color .25s}
.pw-checks li i{font-size:15px;flex:none;transition:transform .2s,color .25s}
.pw-checks li.ok{color:var(--b-text)}
.pw-checks li.ok i{color:var(--ok);transform:scale(1.05)}
.pw-checks li.bad i{color:#C9CDD4}
.pw-match{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;min-height:20px;margin:-6px 0 14px;transition:opacity .2s}
.pw-match.off{opacity:0}.pw-match.ok{color:var(--ok)}.pw-match.bad{color:var(--err)}
.pw-match i{font-size:16px}
.auth-btn{width:100%;height:52px;border:none;border-radius:11px;background:var(--b-navy);color:#fff;font-family:var(--fn);
  font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;
  transition:transform .15s,box-shadow .25s,opacity .25s,background .15s}
.auth-btn:disabled{opacity:.45;cursor:not-allowed}
.auth-btn.ready{animation:btnReady .4s cubic-bezier(.22,1,.36,1);box-shadow:0 8px 26px rgba(15,27,45,.28)}
.auth-btn.ready:hover{background:var(--b-navy2);transform:translateY(-1px)}
.auth-btn.ready:active{transform:scale(.985)}
@keyframes btnReady{0%{transform:scale(.97)}55%{transform:scale(1.02)}100%{transform:scale(1)}}
.auth-spin{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.msg{display:none;margin-top:14px;padding:11px 14px;border-radius:9px;font-size:12.5px;text-align:center;line-height:1.7}
.msg.show{display:block}
.msg.err{background:rgba(179,38,30,.07);color:var(--err);border:1px solid rgba(179,38,30,.18)}
.card.shake{animation:shk .5s cubic-bezier(.36,.07,.19,.97)}
@keyframes shk{10%,90%{transform:translateX(-1px)}20%,80%{transform:translateX(2px)}30%,50%,70%{transform:translateX(-4px)}40%,60%{transform:translateX(4px)}}
.okwrap{text-align:center;padding:10px 0 4px}
.ok-svg{width:84px;height:84px;margin-bottom:12px}
.ok-svg .c{fill:none;stroke:var(--ok);stroke-width:4;stroke-linecap:round;stroke-dasharray:202;stroke-dashoffset:202;animation:dr .55s .1s cubic-bezier(.65,0,.45,1) forwards}
.ok-svg .k{fill:none;stroke:var(--ok);stroke-width:5;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:44;stroke-dashoffset:44;animation:dr .38s .55s cubic-bezier(.65,0,.45,1) forwards}
@keyframes dr{to{stroke-dashoffset:0}}
a.back{display:inline-flex;align-items:center;gap:6px;margin-top:16px;color:var(--b-navy);font-size:13px;font-weight:600;text-decoration:none;padding:9px 12px;border-radius:8px;transition:background .15s}
a.back:hover{background:var(--soft)}
.spin{width:34px;height:34px;border:3px solid rgba(15,27,45,.12);border-top-color:var(--b-navy);border-radius:50%;animation:sp .7s linear infinite;display:inline-block;margin-bottom:12px}
.hidden{display:none!important}
button:focus-visible,input:focus-visible,a:focus-visible{outline:2px solid rgba(47,109,179,.45);outline-offset:1px}
@media (max-width:560px){body{padding:0;background:var(--b-white)}.card{max-width:100%;min-height:100vh;border:none;border-radius:0;box-shadow:none;padding:34px 22px}}
@media (prefers-reduced-motion:reduce){.card,.card.shake,.auth-btn.ready,.pw-eye.pop i{animation:none}.pw-meter-track i{transition:none}.ok-svg .c,.ok-svg .k{animation:none;stroke-dashoffset:0}}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="brand">
    <img src="/brand/light/PNG/logo-256.png" alt="ديوان آل طه">
    <h1>ديوان آل طه</h1>
    <p id="page-sub">تعيين كلمة المرور</p>
  </div>
  <div class="rule"></div>

  <div id="state-loading" class="center-state">
    <span class="spin"></span>
    <p>جارٍ التحقق من الرابط…</p>
  </div>

  <div id="state-form" class="hidden">
    <div class="auth-fi">
      <label for="pw">كلمة المرور الجديدة</label>
      <div class="auth-field"><i class="ti ti-lock-plus afi"></i>
        <input type="password" id="pw" autocomplete="new-password" placeholder="••••••••••••">
        <button type="button" class="pw-eye" data-for="pw" aria-label="إظهار كلمة المرور"><i class="ti ti-eye"></i></button>
      </div>
    </div>
    <div class="pw-meter" aria-hidden="true"><div class="pw-meter-track"><i id="pw-bar"></i></div><span class="pw-meter-lvl" id="pw-lvl" role="status" aria-live="polite">—</span></div>
    <ul class="pw-checks" id="pw-checks" aria-live="polite"></ul>
    <div class="auth-fi">
      <label for="pw2">تأكيد كلمة المرور</label>
      <div class="auth-field"><i class="ti ti-lock-check afi"></i>
        <input type="password" id="pw2" autocomplete="new-password" placeholder="••••••••••••">
        <button type="button" class="pw-eye" data-for="pw2" aria-label="إظهار كلمة المرور"><i class="ti ti-eye"></i></button>
      </div>
    </div>
    <div class="pw-match off" id="pw-match" aria-live="polite"></div>
    <button class="auth-btn" id="btn" disabled onclick="submitNew()">
      <i class="ti ti-lock-check"></i><span>حفظ كلمة المرور</span>
    </button>
    <div class="msg" id="msg" role="alert"></div>
  </div>

  <div id="state-invalid" class="center-state err hidden">
    <i class="ti ti-alert-circle ico"></i>
    <p>هذا الرابط غير صالح أو منتهي الصلاحية.<br>يرجى طلب رابط جديد من صفحة الدخول.</p>
    <a class="back" href="/index.html"><i class="ti ti-arrow-right"></i> العودة إلى صفحة الدخول</a>
  </div>

  <div id="state-done" class="okwrap hidden">
    <svg viewBox="0 0 72 72" class="ok-svg"><circle cx="36" cy="36" r="32" class="c"/><path d="M22 37.5 32 47 51 27" class="k"/></svg>
    <p style="font-size:15px;font-weight:700">تم حفظ كلمة المرور بنجاح</p>
    <p style="font-size:12.5px;color:var(--b-text3);margin-top:6px">جارٍ تحويلك إلى صفحة الدخول…</p>
  </div>
</div>

<script src="/js/auth-password.js"></script>
<script>
const SUPABASE_URL='https://ralifvemgapmsgrjgazh.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhbGlmdmVtZ2FwbXNncmpnYXpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NDU5MjQsImV4cCI6MjA5NDUyMTkyNH0.uw2wupGY89h3lnkgDBka5w8eYWaeITgDOoHbwzz15J4';

const SB=supabase.createClient(SUPABASE_URL,SUPABASE_ANON,{
  auth:{ flowType:'pkce', detectSessionInUrl:true, persistSession:true, autoRefreshToken:true }
});
let recoveryReady=false, sessionUser=null, policyUI=null;

const $=id=>document.getElementById(id);
function show(s){['state-loading','state-form','state-invalid','state-done'].forEach(x=>$(x).classList.add('hidden'));$(s).classList.remove('hidden');}
function setMsg(t,k){const m=$('msg');m.textContent=t||'';m.className='msg'+(t?(' show '+(k||'')):'');}
function shake(){const c=$('card');c.classList.remove('shake');void c.offsetWidth;c.classList.add('shake');}

/* AuthDS wiring — live checklist, strength, match, save gate (EB-08 policy) */
function wireForm(){
  AuthDS.bindEyes(document);
  policyUI=AuthDS.attachPolicyUI({
    newInput:$('pw'), confirmInput:$('pw2'),
    meterBar:$('pw-bar'), meterLvl:$('pw-lvl'),
    checksEl:$('pw-checks'), matchEl:$('pw-match'), saveBtn:$('btn'),
    ctx:function(){ const u=sessionUser||{}; const m=u.user_metadata||{};
      return {email:u.email||'', username:m.full_name||''}; }
  });
  document.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!$('state-form').classList.contains('hidden')){ e.preventDefault(); if(policyUI.isValid()) submitNew(); else shake(); } });
}
async function readyForm(sub){
  recoveryReady=true;
  if(sub) $('page-sub').textContent=sub;
  try{ const {data}=await SB.auth.getUser(); sessionUser=data&&data.user||null; }catch(_){}
  show('state-form'); wireForm();
  if(policyUI) policyUI.refresh();
}

/* اكتشاف الجلسة — يدعم:
   (أ) token_hash + type ∈ {recovery, invite, signup, email_change} → verifyOtp
       (يوحّد الاستعادة والدعوة والتحقق من البريد وإنشاء كلمة المرور لأول مرة)
   (ب) ?code=... → exchangeCodeForSession (PKCE)
   (ج) hash قديم بـ access_token → onAuthStateChange(PASSWORD_RECOVERY)
   (د) احتياطي: جلسة قائمة خلال مهلة قصيرة */
(async function detectRecovery(){
  const search=new URLSearchParams(window.location.search);
  const tokenHash=search.get('token_hash');
  const type=search.get('type');
  const code=search.get('code');
  const SUBS={recovery:'إعادة تعيين كلمة المرور',invite:'إنشاء كلمة المرور لأول مرة',
              signup:'تأكيد البريد وإنشاء كلمة المرور',email_change:'تأكيد البريد الإلكتروني'};

  if(tokenHash && SUBS[type]){
    try{
      const { error }=await SB.auth.verifyOtp({ token_hash:tokenHash, type:type });
      if(!error){ await readyForm(SUBS[type]); return; }
    }catch(_){ /* يسقط إلى شاشة عدم الصلاحية */ }
    show('state-invalid'); return;
  }

  if(code){
    try{
      const { error }=await SB.auth.exchangeCodeForSession(code);
      if(!error){ await readyForm(); return; }
    }catch(_){ /* يسقط للأسفل */ }
    show('state-invalid'); return;
  }

  SB.auth.onAuthStateChange((event)=>{
    if(event==='PASSWORD_RECOVERY'&&!recoveryReady){ readyForm(SUBS.recovery); }
  });

  setTimeout(async ()=>{
    if(recoveryReady) return;
    try{
      const { data }=await SB.auth.getSession();
      if(data && data.session){ await readyForm(); }
      else { show('state-invalid'); }
    }catch(_){ show('state-invalid'); }
  }, 2500);
})();

async function submitNew(){
  const pw=$('pw').value;
  if(!policyUI||!policyUI.isValid()){ shake(); setMsg('أكمل متطلبات كلمة المرور أولاً.','err'); return; }

  const btn=$('btn');
  btn.disabled=true;
  btn.innerHTML='<span class="auth-spin"></span>';
  setMsg('');

  try{
    /* منع إعادة الاستخدام (آخر 5) + تصفير علم كلمة المرور المؤقتة */
    const u=sessionUser||{}; const meta=u.user_metadata||{};
    const hist=Array.isArray(meta.pw_history)?meta.pw_history.slice():[];
    const fp=await AuthDS.fingerprint(pw,u.id);
    if(fp&&hist.indexOf(fp)>=0){
      setMsg('لا يمكن إعادة استخدام إحدى كلمات المرور الخمس الأخيرة.','err'); shake();
      btn.disabled=false; btn.classList.add('ready');
      btn.innerHTML='<i class="ti ti-lock-check"></i><span>حفظ كلمة المرور</span>'; return;
    }
    const newHist=[fp].concat(hist).filter((x,i,a)=>x&&a.indexOf(x)===i).slice(0,5);
    const { error }=await SB.auth.updateUser({ password: pw, data:{ must_change_password:false, pw_history:newHist } });
    if(error){
      setMsg('تعذّر تغيير كلمة المرور: '+error.message,'err'); shake();
      btn.disabled=false; btn.classList.add('ready');
      btn.innerHTML='<i class="ti ti-lock-check"></i><span>حفظ كلمة المرور</span>';
      return;
    }

    try{
      const { data:{ user } }=await SB.auth.getUser();
      await SB.from('audit_log').insert({
        user_name: (user && user.email) ? user.email : 'recovery',
        action: 'auth.password_changed',
        description: 'Password set via secure email link (recovery/invite/verify)',
        table_name: 'auth',
        record_id: null
      });
    }catch(_){ /* تجاهل أي خطأ في التدقيق */ }

    await SB.auth.signOut();
    show('state-done');
    setTimeout(()=>{ window.location.href='/index.html'; }, 1800);
  }catch(e){
    setMsg('حدث خطأ غير متوقع. حاول مرة أخرى.','err'); shake();
    btn.disabled=false; btn.classList.add('ready');
    btn.innerHTML='<i class="ti ti-lock-check"></i><span>حفظ كلمة المرور</span>';
  }
}
</script>
</body>
</html>
