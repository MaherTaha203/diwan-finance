<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>إعادة تعيين كلمة المرور — ديوان آل طه</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="theme-color" content="#0F1B2D">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--navy:#0F1B2D;--gold:#C6A46A;--gold2:#DBC18C;--cream:#F2EEE7;--err:#DC2626;--ok:#059669;--muted:#7a7363;--line:#e3dccd}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:#fff;color:var(--navy);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{width:100%;max-width:420px;background:#fff;border-radius:22px;box-shadow:0 2px 40px rgba(200,150,26,.12);padding:46px 36px 32px;animation:up .5s cubic-bezier(.22,1,.36,1) both}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.brand{text-align:center;margin-bottom:8px}
.brand .ico{width:56px;height:56px;border-radius:14px;background:var(--navy);display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px}
.brand .ico svg{width:34px;height:34px;display:block}
.brand h1{font-size:24px;font-weight:700;background:linear-gradient(135deg,#A9854C,#C6A46A,#DBC18C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand p{font-size:13px;color:var(--muted);margin-top:4px}
.gold-line{width:50px;height:1.5px;background:linear-gradient(90deg,transparent,#E5A820,transparent);margin:14px auto 26px;opacity:.6}
.center-state{text-align:center;padding:14px 0}
.center-state .ico{font-size:38px;display:block;margin-bottom:12px}
.center-state.err .ico{color:var(--err)}
.center-state.ok .ico{color:var(--ok)}
.center-state.load .ico{color:var(--gold2)}
.center-state p{font-size:14px;line-height:1.8;color:#444}
label{display:block;font-size:13px;font-weight:600;color:#555;margin:16px 0 6px}
.field{position:relative}
input{width:100%;height:50px;padding:0 14px 0 44px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:15px;background:var(--cream);color:var(--navy);outline:none;transition:border-color .2s,background .2s}
input:focus{border-color:var(--gold2);background:#fff;box-shadow:0 0 0 3px rgba(200,150,26,.08)}
.toggle{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;padding:4px}
.hint{font-size:12px;color:var(--muted);margin-top:6px}
button.primary{width:100%;height:52px;margin-top:22px;border:none;border-radius:12px;background:linear-gradient(135deg,#C8961A,#E5A820,#F0C050);color:#fff;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 20px rgba(200,150,26,.3);transition:transform .1s,box-shadow .2s}
button.primary:hover{box-shadow:0 6px 28px rgba(200,150,26,.42);transform:translateY(-1px)}
button.primary:disabled{opacity:.55;cursor:not-allowed;transform:none}
.msg{margin-top:16px;font-size:13px;text-align:center;line-height:1.7;display:none}
.msg.show{display:block}
.msg.ok{color:var(--ok)} .msg.err{color:var(--err)}
a.back{display:inline-block;margin-top:18px;color:var(--gold);font-size:13px;text-decoration:none;font-weight:600}
a.back:hover{color:var(--gold2)}
.hidden{display:none!important}
.spin{width:34px;height:34px;border:3px solid rgba(200,150,26,.2);border-top-color:var(--gold2);border-radius:50%;animation:sp .7s linear infinite;display:inline-block;margin-bottom:12px}
@keyframes sp{to{transform:rotate(360deg)}}
.spin-sm{width:18px;height:18px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <span class="ico"><img src="/brand/derived/logo-white-128.png" alt="" style="width:44px;height:44px;display:block;border-radius:10px"></span>
    <h1>ديوان آل طه</h1>
    <p>إعادة تعيين كلمة المرور</p>
  </div>
  <div class="gold-line"></div>

  <div id="state-loading" class="center-state load">
    <span class="spin"></span>
    <p>جارٍ التحقق من الرابط…</p>
  </div>

  <div id="state-form" class="hidden">
    <label for="pw">كلمة المرور الجديدة</label>
    <div class="field">
      <input type="password" id="pw" autocomplete="new-password" placeholder="••••••••••">
      <button type="button" class="toggle" onclick="tog('pw',this)"><i class="ti ti-eye"></i></button>
    </div>
    <p class="hint">10 أحرف على الأقل.</p>

    <label for="pw2">تأكيد كلمة المرور</label>
    <div class="field">
      <input type="password" id="pw2" autocomplete="new-password" placeholder="••••••••••">
      <button type="button" class="toggle" onclick="tog('pw2',this)"><i class="ti ti-eye"></i></button>
    </div>

    <button class="primary" id="btn" onclick="submitNew()">
      <i class="ti ti-lock-check"></i><span>حفظ كلمة المرور</span>
    </button>
    <div class="msg" id="msg"></div>
  </div>

  <div id="state-invalid" class="center-state err hidden">
    <i class="ti ti-alert-circle ico"></i>
    <p>هذا الرابط غير صالح أو منتهي الصلاحية.<br>يرجى طلب رابط جديد من صفحة الدخول.</p>
    <a class="back" href="/index.html"><i class="ti ti-arrow-right"></i> العودة إلى صفحة الدخول</a>
  </div>

  <div id="state-done" class="center-state ok hidden">
    <i class="ti ti-circle-check ico"></i>
    <p>تم تغيير كلمة المرور بنجاح.<br>سيتم تحويلك إلى صفحة الدخول…</p>
  </div>
</div>

<script>
const SUPABASE_URL='https://ralifvemgapmsgrjgazh.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhbGlmdmVtZ2FwbXNncmpnYXpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NDU5MjQsImV4cCI6MjA5NDUyMTkyNH0.uw2wupGY89h3lnkgDBka5w8eYWaeITgDOoHbwzz15J4';
const MIN_LEN=10;

const SB=supabase.createClient(SUPABASE_URL,SUPABASE_ANON,{
  auth:{ flowType:'pkce', detectSessionInUrl:true, persistSession:true, autoRefreshToken:true }
});
let recoveryReady=false;

const $=id=>document.getElementById(id);
function show(s){['state-loading','state-form','state-invalid','state-done'].forEach(x=>$(x).classList.add('hidden'));$(s).classList.remove('hidden');}
function tog(id,btn){const el=$(id);el.type=el.type==='password'?'text':'password';btn.querySelector('i').className=el.type==='password'?'ti ti-eye':'ti ti-eye-off';}
function setMsg(t,k){const m=$('msg');m.textContent=t;m.className='msg show '+(k||'');}

/* اكتشاف الجلسة — يدعم ثلاثة مسارات بالترتيب:
   (أ) token_hash + type=recovery في الرابط  → التحقق عبر verifyOtp (لا يستهلكه ماسح البريد لأنه POST)
   (ب) ?code=...  → تبادل الكود عبر exchangeCodeForSession (PKCE)
   (ج) hash قديم بـ access_token → onAuthStateChange(PASSWORD_RECOVERY)
   (د) احتياطي: جلسة قائمة خلال مهلة قصيرة */
(async function detectRecovery(){
  const search=new URLSearchParams(window.location.search);
  const tokenHash=search.get('token_hash');
  const type=search.get('type');
  const code=search.get('code');

  // (أ) المسار المعتمد: token_hash
  if(tokenHash && type==='recovery'){
    try{
      const { error }=await SB.auth.verifyOtp({ token_hash:tokenHash, type:'recovery' });
      if(!error){ recoveryReady=true; show('state-form'); return; }
    }catch(_){ /* يسقط إلى شاشة عدم الصلاحية */ }
    show('state-invalid'); return;
  }

  // (ب) المسار البديل: code (PKCE)
  if(code){
    try{
      const { error }=await SB.auth.exchangeCodeForSession(code);
      if(!error){ recoveryReady=true; show('state-form'); return; }
    }catch(_){ /* يسقط للأسفل */ }
    show('state-invalid'); return;
  }

  // (ج) المسار القديم: hash بـ access_token
  SB.auth.onAuthStateChange((event)=>{
    if(event==='PASSWORD_RECOVERY'){ recoveryReady=true; show('state-form'); }
  });

  // (د) احتياطي: جلسة قائمة خلال 2.5 ثانية
  setTimeout(async ()=>{
    if(recoveryReady) return;
    try{
      const { data }=await SB.auth.getSession();
      if(data && data.session){ recoveryReady=true; show('state-form'); }
      else { show('state-invalid'); }
    }catch(_){ show('state-invalid'); }
  }, 2500);
})();

async function submitNew(){
  const pw=$('pw').value, pw2=$('pw2').value;
  if(pw.length<MIN_LEN){ setMsg('كلمة المرور يجب ألا تقل عن '+MIN_LEN+' أحرف.','err'); return; }
  if(pw!==pw2){ setMsg('كلمتا المرور غير متطابقتين.','err'); return; }

  const btn=$('btn');
  btn.disabled=true;
  btn.innerHTML='<span class="spin-sm"></span>';
  setMsg('جارٍ الحفظ…','');

  try{
    const { error }=await SB.auth.updateUser({ password: pw });
    if(error){
      setMsg('تعذّر تغيير كلمة المرور: '+error.message,'err');
      btn.disabled=false; btn.innerHTML='<i class="ti ti-lock-check"></i><span>حفظ كلمة المرور</span>';
      return;
    }

    try{
      const { data:{ user } }=await SB.auth.getUser();
      await SB.from('audit_log').insert({
        user_name: (user && user.email) ? user.email : 'recovery',
        action: 'auth.password_changed',
        description: 'Password reset completed via email recovery link',
        table_name: 'auth',
        record_id: null
      });
    }catch(_){ /* تجاهل أي خطأ في التدقيق */ }

    await SB.auth.signOut();
    show('state-done');
    setTimeout(()=>{ window.location.href='/index.html'; }, 1500);
  }catch(e){
    setMsg('حدث خطأ غير متوقع. حاول مرة أخرى.','err');
    btn.disabled=false; btn.innerHTML='<i class="ti ti-lock-check"></i><span>حفظ كلمة المرور</span>';
  }
}
</script>
</body>
</html>
