<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إعادة تعيين كلمة المرور — ديوان آل طه</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --cream:#f7f3ec; --navy:#1f3a5f; --navy-2:#274b78;
      --line:#e3dccd; --ok:#1f7a4d; --err:#b23b3b; --muted:#7a7363;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Cairo',sans-serif; background:var(--cream); color:var(--navy);
      min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
    }
    .card{
      background:#fff; width:100%; max-width:420px; border-radius:18px;
      box-shadow:0 10px 40px rgba(31,58,95,.12); border:1px solid var(--line);
      padding:34px 30px;
    }
    .brand{text-align:center; margin-bottom:24px}
    .brand .ico{
      width:58px; height:58px; border-radius:50%; background:var(--navy);
      color:#fff; display:inline-flex; align-items:center; justify-content:center;
      font-size:28px; margin-bottom:10px;
    }
    .brand h1{font-size:18px; font-weight:700}
    .brand p{font-size:13px; color:var(--muted); margin-top:4px}
    label{display:block; font-size:13px; font-weight:600; margin:14px 0 6px}
    .field{position:relative}
    input{
      width:100%; padding:12px 14px; padding-left:42px; border:1px solid var(--line);
      border-radius:10px; font-family:inherit; font-size:14px; background:var(--cream);
    }
    input:focus{outline:none; border-color:var(--navy-2); background:#fff}
    .toggle{
      position:absolute; left:10px; top:50%; transform:translateY(-50%);
      background:none; border:none; cursor:pointer; color:var(--muted); font-size:18px;
    }
    button.primary{
      width:100%; margin-top:20px; padding:13px; border:none; border-radius:10px;
      background:var(--navy); color:#fff; font-family:inherit; font-size:15px; font-weight:700;
      cursor:pointer; transition:background .15s;
    }
    button.primary:hover{background:var(--navy-2)}
    button.primary:disabled{opacity:.6; cursor:not-allowed}
    .msg{margin-top:16px; font-size:13px; text-align:center; line-height:1.7; display:none}
    .msg.show{display:block}
    .msg.ok{color:var(--ok)}
    .msg.err{color:var(--err)}
    .hint{font-size:12px; color:var(--muted); margin-top:6px}
    .center-state{text-align:center; padding:10px 0}
    .center-state .ico{font-size:34px; margin-bottom:10px; display:block}
    .center-state.err .ico{color:var(--err)}
    .center-state.ok .ico{color:var(--ok)}
    a.back{display:inline-block; margin-top:16px; color:var(--navy-2); font-size:13px; text-decoration:none}
    .hidden{display:none !important}
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <span class="ico"><i class="ti ti-lock"></i></span>
      <h1>ديوان آل طه</h1>
      <p>إعادة تعيين كلمة المرور</p>
    </div>

    <!-- حالة التحميل -->
    <div id="state-loading" class="center-state">
      <i class="ti ti-loader-2 ico"></i>
      <p>جارٍ التحقق من الرابط…</p>
    </div>

    <!-- نموذج تغيير كلمة المرور -->
    <div id="state-form" class="hidden">
      <label for="pw">كلمة المرور الجديدة</label>
      <div class="field">
        <input type="password" id="pw" autocomplete="new-password" placeholder="••••••••••">
        <button type="button" class="toggle" onclick="toggle('pw',this)"><i class="ti ti-eye"></i></button>
      </div>
      <p class="hint">10 أحرف على الأقل.</p>

      <label for="pw2">تأكيد كلمة المرور</label>
      <div class="field">
        <input type="password" id="pw2" autocomplete="new-password" placeholder="••••••••••">
        <button type="button" class="toggle" onclick="toggle('pw2',this)"><i class="ti ti-eye"></i></button>
      </div>

      <button class="primary" id="btn" onclick="submitNew()">
        <i class="ti ti-lock-check"></i> حفظ كلمة المرور
      </button>
      <div class="msg" id="msg"></div>
    </div>

    <!-- رابط غير صالح -->
    <div id="state-invalid" class="center-state err hidden">
      <i class="ti ti-info-circle ico"></i>
      <p>هذا الرابط غير صالح أو منتهي الصلاحية.<br>يرجى طلب رابط جديد من صفحة الدخول.</p>
      <a class="back" href="/index.html"><i class="ti ti-arrow-right"></i> العودة إلى صفحة الدخول</a>
    </div>

    <!-- نجاح -->
    <div id="state-done" class="center-state ok hidden">
      <i class="ti ti-circle-check ico"></i>
      <p>تم تغيير كلمة المرور بنجاح.<br>سيتم تحويلك إلى صفحة الدخول…</p>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ralifvemgapmsgrjgazh.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhbGlmdmVtZ2FwbXNncmpnYXpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzE2MDAwMDAsImV4cCI6MjA0NzE3NjAwMH0.uw2wupGY89h3lnkgDBka5w8eYWaeITgDOoHbwzz15J4';
    const MIN_LEN = 10;

    const SB = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    let recoveryReady = false;

    const $ = id => document.getElementById(id);
    function show(state){
      ['state-loading','state-form','state-invalid','state-done']
        .forEach(s => $(s).classList.add('hidden'));
      $(state).classList.remove('hidden');
    }
    function toggle(id,btn){
      const el=$(id);
      el.type = el.type==='password' ? 'text' : 'password';
      btn.querySelector('i').className = el.type==='password' ? 'ti ti-eye' : 'ti ti-eye-off';
    }
    function setMsg(text,kind){
      const m=$('msg'); m.textContent=text;
      m.className='msg show '+(kind||'');
    }

    // اكتشاف جلسة الاسترداد
    SB.auth.onAuthStateChange((event)=>{
      if(event==='PASSWORD_RECOVERY'){
        recoveryReady = true;
        show('state-form');
      }
    });

    // fallback: إن لم يصل الحدث خلال 2.5 ثانية تحقق من الجلسة يدوياً
    setTimeout(async ()=>{
      if(recoveryReady) return;
      const { data } = await SB.auth.getSession();
      if(data && data.session){
        recoveryReady = true;
        show('state-form');
      }else{
        show('state-invalid');
      }
    }, 2500);

    async function submitNew(){
      const pw=$('pw').value, pw2=$('pw2').value;
      if(pw.length < MIN_LEN){ setMsg('كلمة المرور يجب ألا تقل عن '+MIN_LEN+' أحرف.','err'); return; }
      if(pw!==pw2){ setMsg('كلمتا المرور غير متطابقتين.','err'); return; }

      const btn=$('btn'); btn.disabled=true;
      setMsg('جارٍ الحفظ…','');

      try{
        const { error } = await SB.auth.updateUser({ password: pw });
        if(error){ setMsg('تعذّر تغيير كلمة المرور: '+error.message,'err'); btn.disabled=false; return; }

        // تسجيل الحدث في سجل التدقيق (لا يوقف التدفق عند الفشل)
        try{
          const { data:{ user } } = await SB.auth.getUser();
          await SB.from('audit_log').insert({
            user_name: (user && user.email) ? user.email : 'recovery',
            action: 'auth.password_changed',
            description: 'Password reset completed via email recovery link',
            table_name: 'auth',
            record_id: null
          });
        }catch(_){ /* تجاهل أي خطأ في التدقيق */ }

        await SB.auth.signOut();
        show('state-done');
        setTimeout(()=>{ window.location.href='/index.html'; }, 1500);
      }catch(e){
        setMsg('حدث خطأ غير متوقع. حاول مرة أخرى.','err');
        btn.disabled=false;
      }
    }
  </script>
</body>
</html>
